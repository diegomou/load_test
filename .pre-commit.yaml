# .pre-commit-config.yaml
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version
    rev: v0.9.0
    hooks:
      # Run the linter
      - id: ruff
        args: [ --fix, --line-length=120 ]
      # Run the formatter
      - id: ruff-format
        args: [ --line-length=120 ]
